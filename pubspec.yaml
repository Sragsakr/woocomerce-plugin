name: woocommerce_plugin
description: >-
  A comprehensive Flutter/Dart package for the WooCommerce REST API (v3),
  WooCommerce Store API, and JWT-Auth. Supports products, orders, cart,
  checkout, coupons, categories, attributes, variations, shipping, payments,
  settings, currency, and more.
version: 2.0.0
homepage: https://github.com/Sragsakr/woocomerce-plugin
repository: https://github.com/Sragsakr/woocomerce-plugin
issue_tracker: https://github.com/Sragsakr/woocomerce-plugin/issues

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  cryptography: ^2.7.0
  dio: ^5.0.0
  json_annotation: ^4.8.0
  faker: ^2.1.0
  pretty_dio_logger: ^1.3.1

dev_dependencies:
  build_runner: ^2.4.0
  json_serializable: ^6.7.0
